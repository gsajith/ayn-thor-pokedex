name: CI

on:
  push:
    branches: [main]
  pull_request:

# A superseded run on the same branch is only ever going to be discarded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Palette check
        run: npm run check:palette

      - name: Build
        run: npm run build

      # Only chromium: these tests assert against one specific 537x412 panel,
      # so the other engines would be checking a device that does not exist.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Runs after the build on purpose — the layout suite serves `out/`, and
      # a stale export would silently test the previous commit.
      - name: Layout and accessibility tests
        run: npm run test:e2e

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
